# Datasource configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/myagenda

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Dev Services (disabled - using Docker Compose)
quarkus.datasource.devservices.enabled=false

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=MyAgenda Financial Control API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API for personal financial control management including accounts, transactions, budgets, and crypto portfolio tracking.
quarkus.swagger-ui.always-include=true

# CoinGecko API (free, no key required)
quarkus.rest-client.coingecko-api.url=https://api.coingecko.com/api/v3
quarkus.rest-client.coingecko-api.scope=jakarta.inject.Singleton

app.attachments.storage-dir=C:/Users/FViei/OneDrive/Documentos/Comprovantes

# JWT Configuration
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=myagenda
smallrye.jwt.sign.key.location=privateKey.pem

# Security - public endpoints
quarkus.http.auth.permission.public.paths=/auth/*,/q/*,/swagger-ui/*,/openapi
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.secured.paths=/*
quarkus.http.auth.permission.secured.policy=authenticated

# CORS (allow React dev server)
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.headers=accept,authorization,content-type
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
